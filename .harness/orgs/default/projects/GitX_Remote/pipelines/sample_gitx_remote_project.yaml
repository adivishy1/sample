pipeline:
  name: sample gitx remote project
  identifier: sample_gitx_remote_project
  tags: {}
  projectIdentifier: GitX_Remote
  orgIdentifier: default
  stages:
    - stage:
        name: dafs
        identifier: dafs
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: afs
                  identifier: afs
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Please review the following information
                      and approve the pipeline progression
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups: <+input>
                    isAutoRejectEnabled: false
                    approverInputs: []
        tags: {}
